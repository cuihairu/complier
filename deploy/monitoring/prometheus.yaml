# Prometheus Configuration for Oddsmaker
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alerting rules
rule_files:
  - "alerts/*.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Oddsmaker Control Service
  - job_name: 'oddsmaker-control'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ['oddsmaker-control:8086']
        labels:
          app: 'oddsmaker-control'
          component: 'control-service'
          environment: 'production'

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          app: 'oddsmaker-postgres'
          component: 'database'

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          app: 'oddsmaker-redis'
          component: 'cache'

  # Kafka Exporter
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']
        labels:
          app: 'oddsmaker-kafka'
          component: 'messaging'

  # ClickHouse
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:8123']
        labels:
          app: 'oddsmaker-clickhouse'
          component: 'analytics-db'

  # Flink
  - job_name: 'flink'
    static_configs:
      - targets: ['flink-jobmanager:9249']
        labels:
          app: 'oddsmaker-flink'
          component: 'stream-processing'

  # Node Exporter (for system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          app: 'node-exporter'
