# Backup CronJob for Oddsmaker PostgreSQL
---
# ConfigMap for backup script
apiVersion: v1
kind: ConfigMap
metadata:
  name: oddsmaker-backup-script
  namespace: oddsmaker
  labels:
    app: oddsmaker-backup
data:
  backup.sh: |
    #!/bin/bash
    set -e

    # Configuration
    BACKUP_DIR="/backup"
    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    BACKUP_FILE="$BACKUP_DIR/postgres_$TIMESTAMP.sql.gz"

    # Perform backup
    pg_dump -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME --format=custom --compress=9 --file=$BACKUP_FILE

    # Verify backup
    pg_restore --list $BACKUP_FILE > /dev/null 2>&1

    # Upload to S3 (if configured)
    if [ -n "$S3_BUCKET" ]; then
      aws s3 cp $BACKUP_FILE s3://$S3_BUCKET/postgres/ --storage-class STANDARD_IA
    fi

    # Clean up old backups (keep last 30 days)
    find $BACKUP_DIR -name "*.sql.gz" -type f -mtime +30 -delete

    echo "Backup completed: $BACKUP_FILE"

---
# Secret for backup credentials
apiVersion: v1
kind: Secret
metadata:
  name: oddsmaker-backup-secrets
  namespace: oddsmaker
  labels:
    app: oddsmaker-backup
type: Opaque
stringData:
  DB_HOST: "oddsmaker-postgres"
  DB_PORT: "5432"
  DB_NAME: "oddsmaker"
  DB_USER: "oddsmaker"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  S3_BUCKET: "oddsmaker-backups"
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"

---
# PersistentVolumeClaim for backup storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: oddsmaker-backup-pvc
  namespace: oddsmaker
  labels:
    app: oddsmaker-backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard

---
# CronJob for daily backup
apiVersion: batch/v1
kind: CronJob
metadata:
  name: oddsmaker-postgres-backup
  namespace: oddsmaker
  labels:
    app: oddsmaker-backup
spec:
  schedule: "0 2 * * *"  # Daily at 2:00 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: oddsmaker-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command: ["/bin/bash", "/scripts/backup.sh"]
              envFrom:
                - secretRef:
                    name: oddsmaker-backup-secrets
              volumeMounts:
                - name: backup-script
                  mountPath: /scripts
                - name: backup-storage
                  mountPath: /backup
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
          volumes:
            - name: backup-script
              configMap:
                name: oddsmaker-backup-script
                defaultMode: 0755
            - name: backup-storage
              persistentVolumeClaim:
                claimName: oddsmaker-backup-pvc

---
# CronJob for weekly full backup
apiVersion: batch/v1
kind: CronJob
metadata:
  name: oddsmaker-postgres-full-backup
  namespace: oddsmaker
  labels:
    app: oddsmaker-backup
spec:
  schedule: "0 3 * * 0"  # Weekly on Sunday at 3:00 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: oddsmaker-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command: ["/bin/bash", "/scripts/backup.sh"]
              env:
                - name: BACKUP_TYPE
                  value: "full"
              envFrom:
                - secretRef:
                    name: oddsmaker-backup-secrets
              volumeMounts:
                - name: backup-script
                  mountPath: /scripts
                - name: backup-storage
                  mountPath: /backup
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
          volumes:
            - name: backup-script
              configMap:
                name: oddsmaker-backup-script
                defaultMode: 0755
            - name: backup-storage
              persistentVolumeClaim:
                claimName: oddsmaker-backup-pvc

---
# CronJob for Redis backup
apiVersion: batch/v1
kind: CronJob
metadata:
  name: oddsmaker-redis-backup
  namespace: oddsmaker
  labels:
    app: oddsmaker-backup
spec:
  schedule: "*/15 * * * *"  # Every 15 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: oddsmaker-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: redis:7-alpine
              command:
                - /bin/sh
                - -c
                - |
                  redis-cli -h $REDIS_HOST -a $REDIS_PASSWORD BGSAVE
                  sleep 5
                  cp /data/dump.rdb /backup/redis_$(date +%Y%m%d_%H%M%S).rdb
              env:
                - name: REDIS_HOST
                  value: "oddsmaker-redis"
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: oddsmaker-redis-secrets
                      key: password
              volumeMounts:
                - name: redis-data
                  mountPath: /data
                - name: backup-storage
                  mountPath: /backup
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"
          volumes:
            - name: redis-data
              persistentVolumeClaim:
                claimName: oddsmaker-redis-pvc
            - name: backup-storage
              persistentVolumeClaim:
                claimName: oddsmaker-backup-pvc
